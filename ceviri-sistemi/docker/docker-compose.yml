services:
  lato-translator:
    build: .
    container_name: lato-translator
    restart: always
    volumes:
      - ./data:/app/data
    env_file:
      - /root/.hermes/profiles/lato/.env
    environment:
      - HERMES_HOME=/root/.hermes/profiles/lato
    networks:
      - efloud-bot_default

networks:
  efloud-bot_default:
    external: true
