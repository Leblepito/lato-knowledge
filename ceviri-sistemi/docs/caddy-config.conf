# Caddy reverse proxy config — translate.178-104-122-91.nip.io
# /opt/efloud-caddy/Caddyfile içine eklenir
#
# translate.178-104-122-91.nip.io {
#     encode gzip zstd
#     reverse_proxy lato-translator:8088 {
#         header_up X-Real-IP {remote_host}
#     }
#     header {
#         Strict-Transport-Security "max-age=31536000"
#         X-Content-Type-Options "nosniff"
#         Referrer-Policy "no-referrer-when-downgrade"
#     }
# }
#
# Reload: docker exec efloud-caddy caddy reload --config /etc/caddy/Caddyfile

# ── Network: lato-translator container, efloud-bot_default network'ünde ──
# Container oluşturma:
# docker run -d --name lato-translator --restart always \
#   --network efloud-bot_default \
#   --env-file /root/.hermes/profiles/lato/.env \
#   -e HERMES_HOME=/root/.hermes/profiles/lato \
#   -v /opt/lato-translator/data:/app/data \
#   lato-translator-lato-translator:latest
