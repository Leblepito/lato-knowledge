# Lato LINE Bot — personel ↔ Telegram köprüsü
# NOT: lato-translator servisi buradan kaldırıldı — o servis ceviri-sistemi/docker/docker-compose.yml'de
# tanımlı. (Önceki kopya, aynı container_name ile çakışıyor ve yanlış imajı çalıştırıyordu.)
services:
  lato-line-bot:
    build: .
    container_name: lato-line-bot
    restart: always
    volumes:
      - ./data:/app/data          # line_staff.json kalıcı personel kaydı
    env_file:
      - /root/.hermes/profiles/lato/.env
    environment:
      - HERMES_HOME=/root/.hermes/profiles/lato
    networks:
      - efloud-bot_default

networks:
  efloud-bot_default:
    external: true
